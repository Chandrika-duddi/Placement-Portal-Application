{% extends 'base.html' %}
{% block content %}

<h2>All Users</h2>

<table>
<tr>
<th>Name</th>
<th>Email</th>
<th>Role</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for user in users %}
<tr>
<td>{{ user.name }}</td>
<td>{{ user.email }}</td>
<td>{{ user.role }}</td>
<td>
{% if user.is_approved %}
Approved
{% else %}
Pending
{% endif %}
</td>

<td>
<a href="{{ url_for('approve_user', user_id=user.id) }}">Approve</a>
<a href="{{ url_for('delete_user', user_id=user.id) }}">Delete</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
