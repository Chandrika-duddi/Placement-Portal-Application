<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
</head>
<body>
    <h1>Student Dashboard</h1>
    <h2>Approved Placement Drives</h2>
    <ul>
        {% for drive in drives %}
            <li>
                <strong>{{ drive.company_name }}</strong> - {{ drive.job_role }}
                <p>{{ drive.description }}</p>
                <p>Eligibility: {{ drive.eligibility_criteria }}</p>
                <p>Deadline: {{ drive.application_deadline.strftime('%Y-%m-%d') }}</p>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
